apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-java-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: devops-java-app

  template:
    metadata:
      labels:
        app: devops-java-app

    spec:
      containers:
      - name: devops-java-app
        image: venus0805/devops-java-app:latest
        imagePullPolicy: Always
